<!doctype html>
<html lang="en">

					<button id="clear-btn" title="Clear">Clear</button>
				</div>
			</div>
			<link rel="stylesheet" href="https://unpkg.com/meilisearch-docsearch@latest/dist/index.css" />
  <style type="text/css">
  body {
