<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>Suvie Search</title>
	<link rel="stylesheet" href="style.css">
	<meta name="description" content="Suvie Search — a lightweight client-side search demo" />
  
</head>
<body>
	<main class="app">
		<header class="header">
			<h1 class="logo">Suvie Search</h1>
			<p class="tagline">Search the web, local pages, and crawled content.</p>
			<div class="search-box">
				<input id="search-input" placeholder="Search the web..." autofocus>
				<div class="search-buttons">
					<button id="google-btn" title="Search on Google">Search Google</button>
					<button id="clear-btn" title="Clear">Clear</button>
				</div>
			</div>
		</header>

		<div id="search-info" class="search-info"></div>
		<section id="results" class="results">
			<p class="help">Type to search the web and local data.</p>
		</section>
		<div id="pagination" class="pagination"></div>

		<footer class="footer">
		
		</footer>
	</main>

	<script src="script.js" defer></script>
</body>
</html>
